[experiment]
name = "moderate_load_1m_resnet50"
scenario_duration_s = 20.0
settle_before_s = 3.0
settle_after_s = 2.0
cooldown_after_load_s = 10.0
step_timeout_s = 90.0
mode_stable_records = 3


[kafka]
bootstrap_servers = "172.22.230.235:9092"
client_topic = "dnn_partition.metrics"
server_topic = "dnn_partition.server_metrics"

[client]
control_host = "172.22.229.172"
control_port = 5055
model_name = "resnet18"

[load]
start_command = "\"{python}\" controller/background_client.py --server-url {server_url} --model-name {model_name} --target-rps {load_rps} --workers {workers} --processes {processes}"
server_url = "172.22.231.61:8001"
workers = 8
processes = 4

[output]
directory = "experiment_tools/results"

[[scenarios]]
mode = "full_server"
partition_point = ""
load_model_name = "resnet50_full"
load_rps_values = [20, 40, 90]



